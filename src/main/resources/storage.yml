# === Storage ===

# The type of storage to use. You have the following options:
# "SQLite", "MySQL", "MariaDB"
type: "SQLite"

# This section is only relevant if you use a MySQL database
host: "localhost"
port: 3306
database: "lifestealz"
username: "root"
password: "password"

# Wether or not to enable caching. Only disable this if you know what you're doing, as it can cause performance issues and increase the load on your database.
enableCache: true